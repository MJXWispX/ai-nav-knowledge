<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">WispX AI 知识库 Logo</title>
  <desc id="logoDesc">A circular logo featuring an open book, bat, and AI monogram.</desc>
  <defs>
    <!-- 外圈深色渐变 -->
    <linearGradient id="outerRing" x1="40" y1="40" x2="280" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B2F5B"/>
      <stop offset="1" stop-color="#4A1A3A"/>
    </linearGradient>
    <!-- 内圈背景渐变 -->
    <radialGradient id="innerBg" cx="160" cy="160" r="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5A2040"/>
      <stop offset="1" stop-color="#2A0A1A"/>
    </radialGradient>
    <!-- 书本渐变 -->
    <linearGradient id="bookGrad" x1="100" y1="220" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0E8"/>
      <stop offset="1" stop-color="#D8A8A0"/>
    </linearGradient>
    <!-- 发光效果 -->
    <filter id="glow" x="100" y="100" width="120" height="120" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 外圈 -->
  <circle cx="160" cy="160" r="150" fill="url(#outerRing)"/>
  <circle cx="160" cy="160" r="140" fill="url(#innerBg)"/>

  <!-- 背景书架简化 -->
  <rect x="60" y="50" width="16" height="120" fill="#502040" opacity="0.6"/>
  <rect x="90" y="40" width="18" height="140" fill="#603050" opacity="0.6"/>
  <rect x="120" y="30" width="16" height="160" fill="#502040" opacity="0.6"/>
  <rect x="200" y="30" width="16" height="160" fill="#502040" opacity="0.6"/>
  <rect x="230" y="40" width="18" height="140" fill="#603050" opacity="0.6"/>
  <rect x="260" y="50" width="16" height="120" fill="#502040" opacity="0.6"/>

  <!-- 左侧台灯 -->
  <ellipse cx="90" cy="220" rx="18" ry="8" fill="#3A1020"/>
  <rect x="82" y="190" width="16" height="30" fill="#502030"/>
  <path d="M65 160 L90 135 L115 160 L105 190 L75 190 Z" fill="#E07080" opacity="0.9"/>

  <!-- 右侧书堆 -->
  <rect x="210" y="190" width="60" height="15" rx="3" fill="#803060"/>
  <rect x="210" y="205" width="60" height="15" rx="3" fill="#702050"/>
  <rect x="210" y="220" width="60" height="15" rx="3" fill="#601040"/>

  <!-- 打开的书本 -->
  <path d="M70 250 L160 200 L250 250 L250 300 L160 270 L70 300 Z" fill="url(#bookGrad)" stroke="#401030" stroke-width="3"/>
  <rect x="150" y="250" width="20" height="50" fill="#A03060"/>

  <!-- 中心发光AI圈 -->
  <circle cx="160" cy="130" r="50" fill="none" stroke="#FFB0C0" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <text x="160" y="148" font-size="45" fill="#FFF0F5" font-weight="bold" text-anchor="middle" font-family="serif">AI</text>

  <!-- 蝙蝠 -->
  <path d="M160 80 L140 95 L115 80 L130 110 L160 95 L190 110 L205 80 L180 95 Z" fill="#FFF0F5" opacity="0.9"/>

  <!-- 星星装饰 -->
  <path d="M110 100 L114 110 L124 110 L116 117 L119 127 L110 121 L101 127 L104 117 L96 110 L106 110 Z" fill="#FFD0D8" opacity="0.8"/>
  <path d="M210 100 L214 110 L224 110 L216 117 L219 127 L210 121 L201 127 L204 117 L196 110 L206 110 Z" fill="#FFD0D8" opacity="0.8"/>
  <path d="M220 150 L223 157 L230 157 L225 162 L227 169 L220 165 L213 169 L215 162 L210 157 L217 157 Z" fill="#FFD0D8" opacity="0.7"/>
</svg>
